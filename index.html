<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AlzheiCare — AI Assistant Test</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --border: #e2ddd5;
    --text: #1a1a1a;
    --muted: #8a8278;
    --accent: #2d6a4f;
    --accent-light: #e8f4ef;
    --accent-dark: #1b4332;
    --user-bg: #2d6a4f;
    --user-text: #ffffff;
    --bot-bg: #ffffff;
    --bot-text: #1a1a1a;
    --danger: #c0392b;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 720px;
    height: 92vh;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .logo {
    width: 38px;
    height: 38px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 20px; height: 20px; fill: white; }

  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .status-dot {
    width: 8px; height: 8px;
    background: #27ae60;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(39,174,96,0.15);
  }

  /* ── Config bar ── */
  .config {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    background: #faf8f5;
  }

  .config label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .config input, .config select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .config input:focus, .config select:focus {
    border-color: var(--accent);
  }

  .config input[type="number"] { width: 70px; }
  .config input[type="text"] { width: 160px; }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .bubble-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp .25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .avatar.bot { background: var(--accent-light); color: var(--accent-dark); }
  .avatar.user { background: var(--accent); color: white; }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
  }

  .bubble.bot {
    background: var(--bot-bg);
    color: var(--bot-text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }

  .bubble .time {
    font-size: 10px;
    opacity: 0.5;
    margin-top: 6px;
    display: block;
  }

  /* typing indicator */
  .typing .bubble {
    padding: 14px 18px;
  }

  .dots { display: flex; gap: 4px; }
  .dots span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }

  .empty svg { width: 40px; height: 40px; opacity: .25; }
  .empty p { font-size: 14px; }
  .empty small { font-size: 12px; opacity: .7; }

  /* ── Input bar ── */
  .input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
  }

  #input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    background: #faf8f5;
    color: var(--text);
    transition: border-color .2s;
  }

  #input:focus { border-color: var(--accent); background: white; }
  #input::placeholder { color: var(--muted); }

  #sendBtn {
    width: 42px; height: 42px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .2s, transform .1s;
  }

  #sendBtn:hover { background: var(--accent-dark); }
  #sendBtn:active { transform: scale(.95); }
  #sendBtn:disabled { background: var(--border); cursor: not-allowed; }

  #sendBtn svg { width: 18px; height: 18px; }

  /* error */
  .error-msg {
    font-size: 12px;
    color: var(--danger);
    padding: 6px 16px;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <div class="header-text">
      <h1>AlzheiCare Assistant</h1>
      <p>AI-powered Alzheimer care support — test interface</p>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <!-- Config -->
  <div class="config">
    <label>
      Patient name
      <input type="text" id="patientName" value="Fatima Ben Ali"/>
    </label>
    <label>
      Age
      <input type="number" id="patientAge" value="74" min="50" max="100"/>
    </label>
    <label>
      Stage
      <select id="stage">
        <option value="0">0 — Early</option>
        <option value="1">1 — Moderate</option>
        <option value="2">2 — Late</option>
      </select>
    </label>
    <label>
      Your role
      <select id="userRole">
        <option value="caregiver">Caregiver</option>
        <option value="doctor">Doctor</option>
      </select>
    </label>
    <label>
      API URL
      <input type="text" id="apiUrl" value="http://localhost:8000/chat" style="width:200px"/>
    </label>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      <p>No messages yet</p>
      <small>Ask anything about Alzheimer's care</small>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Input -->
  <div class="input-bar">
    <textarea id="input" rows="1" placeholder="Ask a question about Alzheimer's care..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  // ── Conversation history (sent to FastAPI on each request) ──
  let history = [];

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const errorEl    = document.getElementById('errorMsg');
  const emptyEl    = document.getElementById('emptyState');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter = new line)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addBubble(role, text) {
    if (emptyEl) emptyEl.remove();

    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = text.replace(/\n/g, '<br/>');

    const time = document.createElement('span');
    time.className = 'time';
    time.textContent = getTime();
    bubble.appendChild(time);

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row bot typing';
    row.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    setTimeout(() => errorEl.style.display = 'none', 5000);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Show user bubble
    addBubble('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    // Read config
    const payload = {
      message:      text,
      patient_name: document.getElementById('patientName').value || 'Patient',
      patient_age:  parseInt(document.getElementById('patientAge').value) || 70,
      stage:        parseInt(document.getElementById('stage').value),
      user_role:    document.getElementById('userRole').value,
      history:      history
    };

    const apiUrl = document.getElementById('apiUrl').value;

    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const data = await res.json();
      const reply = data.reply;

      removeTyping();
      addBubble('bot', reply);

      // Update history for next request
      history.push({ role: 'user',      content: text  });
      history.push({ role: 'assistant', content: reply });

      // Keep only last 20 messages
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      removeTyping();
      showError('Could not reach the AI service. Make sure main.py is running on port 8000.');
      console.error(err);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
